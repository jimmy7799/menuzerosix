<style>
:root{
  --blue:#2E86C1;
  --blue2:#5DADE2;
  --white:#ffffff;
  --soft:#f4f9ff;
}

body{
  font-family:Arial;
  background:var(--soft);
  padding:12px;
}

h1{text-align:center;color:var(--blue)}

.box{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.acc{
  background:var(--blue);
  color:white;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  cursor:pointer;
}

.panel{display:none;padding:8px}

.menu{
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.menu:hover{background:#eef7ff}

.cart-item{
  border-bottom:1px dashed #ccc;
  padding:8px 0;
}

button{
  background:var(--blue);
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}
button:hover{background:var(--blue2)}

.total{
  text-align:center;
  font-weight:bold;
  margin-top:10px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:white;
  padding:15px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

.qty{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px 0;
}
</style>
</head>

    <textarea id="note" placeholder="Catatan..." style="width:100%;margin-top:10px"></textarea>

let cart=[];
let currentItem=null;
let qty=1;
let variants=[];
let editIndex=null;

/* MENU */
function renderMenu(){
  let html="";
  let i=0;
  for(const cat in data){
    html+=`<div class="acc" onclick="toggle(${i})">${cat}</div><div class="panel" id="p${i}">`;
    for(const item in data[cat]){
      html+=`<div class="menu" onclick="openModal('${cat}','${item}')">${item}</div>`;
    }
    html+=`</div>`;
    i++;
  }
  document.getElementById("menu").innerHTML=html;
}
renderMenu();

function toggle(i){
  let el=document.getElementById("p"+i);
  el.style.display = el.style.display=="block"?"none":"block";
}

/* MODAL */
function openModal(cat,item){
  const val=data[cat][item];
  editIndex=null;
  currentItem={cat,item,val};
  qty=1;
  variants=[""];
  document.getElementById("modalTitle").innerText=item;
  document.getElementById("qty").innerText=qty;
  document.getElementById("note").value="";
  renderVariants();
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  editIndex=null;
}

function changeQty(n){
  qty+=n;
  if(qty<1) qty=1;
  if(n>0){ variants.push(""); }
  else if(n<0 && variants.length>1){ variants.pop(); }
  document.getElementById("qty").innerText=qty;
  renderVariants();
}

function renderVariants(){
  let html="";
  if(currentItem && currentItem.val && currentItem.val.options){
    variants.forEach((v,i)=>{
      html+=`
      <div>
        ${i+1}.
        <select onchange="setVar(${i},this.value)">
          <option value="">Pilih</option>
          ${currentItem.val.options.map(o=>`<option ${o===v?"selected":""}>${o}</option>`).join("")}
        </select>
      </div>`;
    });
  }
  document.getElementById("variantArea").innerHTML=html;
}

function setVar(i,v){ variants[i]=v; }

/* SAVE */
function saveItem(){
  if(currentItem.val.options){
    for(let v of variants){
      if(!v){
        alert("Varian wajib dipilih!");
        return;
      }
    }
  }

  const newData={
    name:currentItem.item,
    price:currentItem.val.price||currentItem.val,
    qty,
    variants:[...variants],
    note:document.getElementById("note").value
  };

  if(editIndex!==null){
    cart[editIndex]=newData;
  } else {
    cart.push(newData);
  }

  closeModal();
  renderCart();
}

/* CART */
function renderCart(){
  let html="";
  let total=0;

  cart.forEach((c,i)=>{
    let sub=c.qty*c.price;
    total+=sub;

    html+=`
    <div class="cart-item">
      <b>${c.name} x${c.qty}</b><br>
      Varian:<br>
      ${c.variants.map(v=>"- "+v).join("<br>")}
      <br>Catatan: ${c.note||"-"}<br>
      <button onclick="editItem(${i})">Edit</button>
      <button onclick="deleteItem(${i})">Hapus</button>
    </div>`;
  });

  document.getElementById("cart").innerHTML=html;
  document.getElementById("total").innerText=total.toLocaleString("id-ID");
}

function deleteItem(i){
  cart.splice(i,1);
  renderCart();
}

function editItem(i){
  let c=cart[i];
  editIndex=i;

  let foundVal=null;
  for(const cat in data){
    if(data[cat][c.name]){
      foundVal=data[cat][c.name];
      break;
    }
  }

  currentItem={
    item:c.name,
    val:foundVal || {price:c.price}
  };

  qty=c.qty;
  variants=[...c.variants];

  document.getElementById("modalTitle").innerText=c.name;
  document.getElementById("qty").innerText=qty;
  document.getElementById("note").value=c.note;

  renderVariants();
  document.getElementById("modal").style.display="flex";
}

/* WA */
function sendWA(){
  if(cart.length==0){
    alert("Cart kosong!");
    return;
  }

  let text="ORDER ZERO SIX\n\n";

  cart.forEach((c,i)=>{
    text+=`${i+1}. ${c.name} x${c.qty}\n`;
    text+=`   Varian:\n`;
    c.variants.forEach(v=> text+=`   - ${v}\n`);
    if(c.note) text+=`   Catatan: ${c.note}\n`;
  });

  window.open("https://wa.me/6285175313330?text="+encodeURIComponent(text));
}
</script>
