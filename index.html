<script>
const data = {
  "SPECIAL PARADISE":{
    "Indomie 06": {price:8000, options:["Kuah","Goreng"]},
    "Bakmi Goreng":20000
  },
  "SNACK":{
    "Kebab 06":12000,
    "Samosa":15000
  }
};

let cart=[];
let currentItem=null;
let qty=1;
let variants=[];
let editIndex=null; // ✅ PENANDA EDIT

/* RENDER MENU */
function renderMenu(){
  let html="";
  let i=0;

  for(const cat in data){
    html+=`<div class="acc" onclick="toggle(${i})">${cat}</div>
    <div class="panel" id="p${i}">`;

    for(const item in data[cat]){
      html+=`<div class="menu" onclick="openModal('${cat}','${item}')">${item}</div>`;
    }

    html+=`</div>`;
    i++;
  }

  document.getElementById("menu").innerHTML=html;
}
renderMenu();

function toggle(i){
  let el=document.getElementById("p"+i);
  el.style.display = el.style.display=="block"?"none":"block";
}

/* MODAL */
function openModal(cat,item){
  const val=data[cat][item];

  editIndex = null; // ✅ reset mode edit

  currentItem={cat,item,val};
  qty=1;
  variants=[""];

  document.getElementById("modalTitle").innerText=item;
  document.getElementById("qty").innerText=qty;

  renderVariants();
  document.getElementById("note").value="";

  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  editIndex = null; // ✅ reset biar aman
}

function changeQty(n){
  qty+=n;
  if(qty<1) qty=1;

  if(n>0) variants.push("");
  if(n<0) variants.pop();

  document.getElementById("qty").innerText=qty;
  renderVariants();
}

function renderVariants(){
  let html="";
  if(currentItem.val.options){
    variants.forEach((v,i)=>{
      html+=`<div>
        ${i+1}.
        <select onchange="setVar(${i},this.value)">
          <option value="">Pilih</option>
          ${currentItem.val.options.map(o=>`<option ${o===v?"selected":""}>${o}</option>`).join("")}
        </select>
      </div>`;
    });
  }
  document.getElementById("variantArea").innerHTML=html;
}

function setVar(i,v){ variants[i]=v; }

/* SAVE (FIXED) */
function saveItem(){
  if(currentItem.val.options){
    for(let v of variants){
      if(!v){
        alert("Varian wajib dipilih!");
        return;
      }
    }
  }

  const newData = {
    name: currentItem.item,
    price: currentItem.val.price || currentItem.val,
    qty,
    variants:[...variants],
    note: document.getElementById("note").value
  };

  if(editIndex !== null){
    // ✅ EDIT (replace)
    cart[editIndex] = newData;
  } else {
    // ✅ TAMBAH BARU
    cart.push(newData);
  }

  closeModal();
  renderCart();
}

/* CART */
function renderCart(){
  let html="";
  let total=0;

  cart.forEach((c,i)=>{
    let sub=c.qty*c.price;
    total+=sub;

    html+=`
    <div class="cart-item">
      <b>${c.name} x${c.qty}</b><br>
      Varian:<br>
      ${c.variants.map(v=>"- "+v).join("<br>")}
      <br>Catatan: ${c.note||"-"}
      <br>
      <button onclick="editItem(${i})">Edit</button>
      <button onclick="deleteItem(${i})">Hapus</button>
    </div>`;
  });

  document.getElementById("cart").innerHTML=html;
  document.getElementById("total").innerText=total.toLocaleString("id-ID");
}

function deleteItem(i){
  cart.splice(i,1);
  renderCart();
}

function editItem(i){
  let c=cart[i];

  editIndex = i; // ✅ MASUK MODE EDIT

  currentItem={
    item:c.name,
    val:{price:c.price, options:null}
  };

  qty=c.qty;
  variants=[...c.variants];

  document.getElementById("modalTitle").innerText=c.name;
  document.getElementById("qty").innerText=qty;
  document.getElementById("note").value=c.note;

  renderVariants();
  document.getElementById("modal").style.display="flex";
}

/* WA */
function sendWA(){
  if(cart.length==0){
    alert("Cart kosong!");
    return;
  }

  let text="ORDER ZERO SIX\n\n";

  cart.forEach((c,i)=>{
    text+=`${i+1}. ${c.name} x${c.qty}\n`;
    text+=`   Varian:\n`;
    c.variants.forEach(v=> text+=`   - ${v}\n`);
    if(c.note) text+=`   Catatan: ${c.note}\n`;
  });

  window.open("https://wa.me/6285175313330?text="+encodeURIComponent(text));
}
</script>
