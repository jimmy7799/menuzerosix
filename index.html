<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZERO SIX SKY LOUNGE</title>

<style>
body{
font-family:Arial;
background:#0b2f40;
color:white;
padding:12px
}

h1{text-align:center;color:#f0bb3f}
h2{text-align:center;color:#ccc;font-size:14px}

.box{
background:#0f3b52;
padding:12px;
border-radius:12px;
margin-bottom:10px
}

input,select,textarea{
width:100%;
padding:8px;
border-radius:8px;
border:none;
margin-bottom:10px
}

/* ACCORDION */
.acc{
background:#f0bb3f;
color:#000;
padding:10px;
border-radius:10px;
margin-top:8px;
cursor:pointer;
font-weight:bold;
}

.panel{display:none;padding:5px}

/* MENU */
.menu{
padding:8px;
border-bottom:1px dashed #aaa;
cursor:pointer;
}

.menu:hover{background:#123}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#fff;
color:#000;
padding:15px;
border-radius:12px;
width:90%;
max-width:400px
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin:10px 0
}

button{
padding:6px 10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.send{width:100%;background:#f0bb3f}
</style>
</head>

<body>

<h1>ZERO SIX SKY LOUNGE</h1>
<h2>Reservasi & Order</h2>

<div class="box">
<input id="nama" placeholder="Nama lengkap">
<input type="date" id="tanggal">
<input type="time" id="jam">
<input id="event" placeholder="Event">
<select id="lokasi">
<option value="">Pilih lokasi</option>
<option>Indoor</option>
<option>Outdoor</option>
</select>
<input type="number" id="pax" placeholder="Jumlah pax">

<input id="search" placeholder="Cari menu...">
</div>

<div class="box" id="menu"></div>

<div class="box">
<h3>Cart</h3>
<div id="cart"></div>
<div>Total: Rp <span id="total">0</span></div>
<button class="send" onclick="sendWA()">Kirim WhatsApp</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3 id="title"></h3>

<div class="qty">
<button onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button onclick="changeQty(1)">+</button>
</div>

<div id="varian"></div>
<textarea id="note" placeholder="Catatan"></textarea>

<button onclick="saveItem()">Simpan</button>
<button onclick="closeModal()">Batal</button>
</div>
</div>

<script>

/* ================= DATA FULL ================= */
const data = {
"SPECIAL PARADISE":{
"Bakmi Goreng":20000,
"Nasi Goreng Special":25000,
"Indomie 06":{price:8000,options:["Kuah","Goreng"]},
"Indomie SUPER HOT Lvl 1-5":{price:14000,options:["Kuah","Goreng"],level:["1","2","3","4","5"]},
"Indomie SUPER HOT Lvl 6-10":{price:15000,options:["Kuah","Goreng"],level:["6","7","8","9","10"]},
"Indomie Goreng Sambal Matah":15000,
"Indomie Goreng Chicken Black Pepper":15000
},

"CITA RASA NUSANTARA":{
"Nasi Ayam Sambal Hijau":20000,
"Nasi Ayam Tempong":25000,
"Nasi Bakar":15000,
"Sego Sambel":10000,
"Nasi Tahu & Tempe Sambal Seger":10000,
"Nasi Ayam Geprek":20000
},

"CHEFS SELECTION":{
"Pasta Carbonara":{price:25000,options:["Fusili","Penne","Makaroni"]},
"Pasta Butter Cheese":{price:20000,options:["Fusili","Penne","Makaroni"]},
"Pasta Bolognese":{price:20000,options:["Fusili","Penne","Makaroni"]},
"Rice Bowl Chicken Brown Sauce":20000,
"Rice Bowl Chicken Black Pepper":25000,
"Rice Bowl Chicken Sambal Matah":20000,
"Chicken Steak":25000,
"Tender Beef Steak":35000
},

"SNACK":{
"Kebab 06":12000,
"Martabak Mini":12000,
"Samosa":15000,
"Beef Burger":20000,
"Chicken Burger":15000,
"Chicken Lolipop":18000,
"French Fries":15000,
"Jamur Crispy":12000,
"Lumpia Rebung":12000,
"Onion Ring":15000,
"Potato Wedges":15000,
"Puding":5000,
"Sosis Solo":12000,
"Tahu Crispy":10000,
"Tahu Mercon":12000
},

"ROTI MARYAM":{
"Roti Maryam Original":8000,
"Roti Maryam Chocolate":10000,
"Roti Maryam Cheese":12000,
"Roti Maryam Chocolate Cheese":15000
},

"SPARKLING":{
"Blue Lemonade Sparkling":18000,
"Butterfly Bloom Sparkling":18000,
"Golden Sunrise Sparkling":18000,
"Illusion Sparkling":18000,
"Mystic Berry Sparkling":18000,
"Rainbow Paradise Sparkling":18000
},

"ADDITIONAL":{
"Nasi Putih":5000,
"Sambal":4000,
"Sauce Steak":5000,
"Telur":5000,
"Charge Take Away":1000,
"Additional Boba":3000
}
};

/* ================= SYSTEM ================= */
let cart=[];
let current=null;
let qty=1;
let variants=[];
let levels=[];

/* ================= MENU ================= */
search.oninput=render;

function render(){
let html="";
let q=search.value.toLowerCase();
let i=0;

for(const cat in data){

html+=`<div class="acc" onclick="toggle(${i})">${cat}</div>`;
html+=`<div class="panel" id="c${i}">`;

for(const item in data[cat]){
if(item.toLowerCase().includes(q)){
html+=`<div class="menu" onclick="openItem('${cat}','${item}')">${item}</div>`;
}
}

html+=`</div>`;
i++;
}

menu.innerHTML=html;
}
render();

function toggle(i){
document.querySelectorAll(".panel").forEach((p,idx)=>{
p.style.display=(idx===i && p.style.display!=="block")?"block":"none";
});
}

/* ================= MODAL ================= */
function openItem(cat,item){
current={item,val:data[cat][item]};
qty=1;
variants=[""];
levels=[""];

title.innerText=item;
qtyEl.innerText=qty;

renderVar();
modal.style.display="flex";
}

function changeQty(n){
qty+=n;if(qty<1)qty=1;

if(n>0){variants.push("");levels.push("");}
if(n<0){variants.pop();levels.pop();}

qtyEl.innerText=qty;
renderVar();
}

function renderVar(){
let html="";

if(current.val.options){
variants.forEach((v,i)=>{
html+=`<select onchange="variants[${i}]=this.value">
<option value="">Pilih Varian</option>
${current.val.options.map(o=>`<option>${o}</option>`)}
</select>`;
});
}

if(current.val.level){
levels.forEach((v,i)=>{
html+=`<select onchange="levels[${i}]=this.value">
<option value="">Level</option>
${current.val.level.map(o=>`<option>${o}</option>`)}
</select>`;
});
}

varian.innerHTML=html;
}

function closeModal(){modal.style.display="none";}

/* ================= SAVE ================= */
function saveItem(){

if(current.val.options && variants.includes("")){
alert("Varian wajib dipilih!");
return;
}

let item={
name:current.item,
qty,
price:current.val.price||current.val,
variants:[...variants],
note:note.value
};

cart.push(item);
closeModal();
renderCart();
}

/* ================= CART ================= */
function renderCart(){
let html="",total=0;

cart.forEach((c,i)=>{
let sub=c.qty*c.price;
total+=sub;

html+=`<div>
<b>${c.name} x${c.qty}</b><br>
${c.variants.map(v=>"- "+v).join("<br>")}
<br>Catatan: ${c.note||"-"}
</div><hr>`;
});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText=total.toLocaleString("id-ID");
}

/* ================= WA ================= */
function sendWA(){
let t="ORDER ZERO SIX\n\n";

cart.forEach((c,i)=>{
t+=`${i+1}. ${c.name} x${c.qty}\n`;
c.variants.forEach(v=>t+=`- ${v}\n`);
if(c.note)t+=`Catatan: ${c.note}\n`;
});

window.open("https://wa.me/6285175313330?text="+encodeURIComponent(t));
}
</script>

</body>
</html>
