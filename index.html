width:100%;padding:8px;margin-bottom:8px;border-radius:8px;border:1px solid #ccc

.menu:hover{background:#eaf4ff}

button{
background:#2E86C1;color:white;border:none;padding:6px 10px;border-radius:8px;cursor:pointer
}

.modal{
position:fixed;top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,.5);
display:none;align-items:center;justify-content:center;

.modal-content{
background:white;padding:15px;border-radius:12px;width:90%;max-width:400px

.qty{display:flex;justify-content:center;gap:10px;margin:10px 0}

<body>

<div class="box">
<input id="nama" placeholder="Nama lengkap">
<input type="date" id="tanggal">
<input type="time" id="jam">
<input id="event" placeholder="Event">
<select id="lokasi">

<div>Total: Rp <span id="total">0</span></div>
<button onclick="sendWA()">Kirim WA</button>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<h3 id="modalTitle"></h3>

<div class="qty">
<button onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button onclick="changeQty(1)">+</button>
</div>

<div id="variantArea"></div>
<textarea id="note" placeholder="Catatan"></textarea>

<button onclick="saveItem()">Simpan</button>
<button onclick="closeModal()">Batal</button>
</div>

<script>

/* ==== SYSTEM ==== */
let cart=[];
let currentItem=null;
let qty=1;
let variants=[];
let levels=[];
let editIndex=null;

document.getElementById("search").addEventListener("input",renderMenu);

function renderMenu(){
let html="";
let q=search.value.toLowerCase();

for(const cat in data){
html+=`<b>${cat}</b>`;
for(const item in data[cat]){
if(item.toLowerCase().includes(q)){
html+=`<div class="menu" onclick="openModal('${cat}','${item}')">${item}</div>`;
}
}
}
menu.innerHTML=html;
}
renderMenu();

function openModal(cat,item){
let val=data[cat][item];
editIndex=null;
currentItem={cat,item,val};
qty=1;
variants=[""];
levels=[""];
modalTitle.innerText=item;
qtyEl.innerText=qty;
note.value="";
renderVariants();
modal.style.display="flex";
}

function changeQty(n){
qty+=n;
if(qty<1)qty=1;
if(n>0){variants.push("");levels.push("");}
if(n<0 && variants.length>1){variants.pop();levels.pop();}
qtyEl.innerText=qty;
renderVariants();
}

function renderVariants(){
let html="";

if(currentItem.val.options){
variants.forEach((v,i)=>{
html+=`<select onchange="variants[${i}]=this.value">
<option value="">Pilih</option>
${currentItem.val.options.map(o=>`<option ${o==v?"selected":""}>${o}</option>`)}
</select>`;
});
}

if(currentItem.val.level){
levels.forEach((v,i)=>{
html+=`<select onchange="levels[${i}]=this.value">
<option value="">Level</option>
${currentItem.val.level.map(o=>`<option ${o==v?"selected":""}>${o}</option>`)}
</select>`;
});
}

variantArea.innerHTML=html;
}

function saveItem(){

const newData={
name:currentItem.item,
price:currentItem.val.price||currentItem.val,
qty,
variants:[...variants],
levels:[...levels],
note:note.value
};

if(editIndex!==null){
cart[editIndex]=newData;
}else{
cart.push(newData);
}

closeModal();
renderCart();
}

function closeModal(){modal.style.display="none";}

function renderCart(){
let html="",total=0;

cart.forEach((c,i)=>{
let sub=c.qty*c.price;
total+=sub;

html+=`<div class="cart-item">
<b>${c.name} x${c.qty}</b><br>
${c.variants.map(v=>"- "+v).join("<br>")}
${c.levels.some(l=>l)?`<br>${c.levels.map(l=>"- Lv "+l).join("<br>")}`:""}
<br>Catatan: ${c.note||"-"}<br>
<button onclick="editItem(${i})">Edit</button>
<button onclick="deleteItem(${i})">Hapus</button>
</div>`;
});

cart.innerHTML=html;
total.innerText=total.toLocaleString("id-ID");
}

function deleteItem(i){cart.splice(i,1);renderCart();}

function editItem(i){
let c=cart[i];
editIndex=i;

for(const cat in data){
if(data[cat][c.name]){
currentItem={item:c.name,val:data[cat][c.name]};
break;
}
}

qty=c.qty;
variants=[...c.variants];
levels=[...c.levels];

modalTitle.innerText=c.name;
qtyEl.innerText=qty;
note.value=c.note;

renderVariants();
modal.style.display="flex";
}

function sendWA(){
let t=`RESERVASI ZERO SIX\n\n`;
t+=`Nama: ${nama.value}\nTanggal: ${tanggal.value}\nJam: ${jam.value}\nEvent: ${event.value}\nLokasi: ${lokasi.value}\nPax: ${pax.value}\n\n`;

cart.forEach((c,i)=>{
t+=`${i+1}. ${c.name} x${c.qty}\n`;
c.variants.forEach(v=>t+=`- ${v}\n`);
c.levels.forEach(l=>l&&(t+=`- Level ${l}\n`));
if(c.note)t+=`Catatan: ${c.note}\n`;
});

window.open("https://wa.me/6285175313330?text="+encodeURIComponent(t));
}
</script>
