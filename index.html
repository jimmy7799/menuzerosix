<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body{
  font-family:Arial;
  background: linear-gradient(135deg, #e3f6ff, #cdefff);
  color:#1b3a4b;
  padding:12px;
}

.box{
  background:#ffffff;
  padding:12px;
  border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.menu{
  border-bottom:1px dashed #b5e3f5;
  margin-bottom:10px;
  padding-bottom:10px;
  cursor:pointer;
}

button{
  background:linear-gradient(135deg,#5fd3ff,#2fb7ff);
  border:none;
  padding:6px 12px;
  border-radius:8px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

input, select, textarea{
  width:100%;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
  border:1px solid #cdefff;
}

.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup-box{
  background:#fff;
  padding:20px;
  border-radius:16px;
  width:320px;
}
</style>
</head>

<body>

<h2>ORDER MENU</h2>

<!-- RESERVASI -->
<div class="box">
  <input id="nama" placeholder="Nama Pembeli" />
  <input type="date" id="tanggal" />
  <input type="time" id="jam" />
  <input id="eventName" placeholder="Event" />

  <select id="lokasi">
    <option value="">Pilih Lokasi</option>
    <option>Indoor</option>
    <option>Outdoor</option>
  </select>

  <input type="number" id="pax" placeholder="Jumlah Pax" />
</div>

<!-- SEARCH -->
<div class="box">
  <input id="search" placeholder="Cari menu..." oninput="render()" />
</div>

<!-- MENU -->
<div id="menu" class="box"></div>

<!-- CART -->
<div class="box">
<h3>🛒 Keranjang</h3>
<div id="cartList">Kosong</div>
</div>

<div class="box">
TOTAL: Rp <span id="total">0</span>
</div>

<!-- CATATAN + WA -->
<div class="box">
  <textarea id="note" placeholder="Catatan umum"></textarea>
  <button onclick="sendWA()" style="width:100%;padding:12px;">
    Kirim ke WhatsApp
  </button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h3 id="popupTitle"></h3>

    Qty:
    <button onclick="changeQty(-1)">-</button>
    <span id="popupQty">1</span>
    <button onclick="changeQty(1)">+</button>

    <div id="popupVarian"></div>

    <textarea id="popupNote" placeholder="Catatan item"></textarea>

    <button onclick="savePopup()">Simpan</button>
    <button onclick="closePopup()">Batal</button>
  </div>
</div>

<script>

let cart = {};
let total = 0;
let popupItem=null;
let popupQty=1;

function formatRp(n){
  return Number(n).toLocaleString("id-ID");
}

/* POPUP */
function openPopup(name,val){
  popupItem={name,val};
  popupQty=1;
  document.getElementById("popupTitle").innerText=name;
  document.getElementById("popupNote").value="";
  document.getElementById("popup").style.display="flex";
  updatePopup();
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function changeQty(v){
  popupQty+=v;
  if(popupQty<1) popupQty=1;
  updatePopup();
}

function updatePopup(){
  document.getElementById("popupQty").innerText=popupQty;

  let html="";

  if(typeof popupItem.val==="object"){
    for(let i=0;i<popupQty;i++){

      html+=`<div>`;

      if(popupItem.val.options){
        html+=`
        Varian
        <select id="var_${i}">
          <option value="">-- pilih --</option>
          ${popupItem.val.options.map(o=>`<option>${o}</option>`).join("")}
        </select>`;
      }

      if(popupItem.val.levels){
        html+=`
        Level
        <select id="lvl_${i}">
          <option value="">-- pilih --</option>
          ${popupItem.val.levels.map(l=>`<option>${l}</option>`).join("")}
        </select>`;
      }

      html+=`</div>`;
    }
  }

  document.getElementById("popupVarian").innerHTML=html;
}

/* SAVE */
function savePopup(){
  let price = typeof popupItem.val==="number"?popupItem.val:popupItem.val.price;
  let id = popupItem.name;

  if(!cart[id]) cart[id]={name:id,q:0,p:price,detail:[]};

  for(let i=0;i<popupQty;i++){
    let varian = document.getElementById("var_"+i)?.value || "";
    let level = document.getElementById("lvl_"+i)?.value || "";
    let note = document.getElementById("popupNote").value;

    cart[id].detail.push({varian,level,note});
  }

  cart[id].q+=popupQty;
  total+=price*popupQty;

  renderCart();
  updateTotal();
  closePopup();
}

/* CATEGORY */
function toggleCategory(cat){
  let el = document.getElementById("cat_"+cat);
  el.style.display = el.style.display==="block"?"none":"block";
}

/* RENDER */
function render(){
  let key = document.getElementById("search").value.toLowerCase();
  let html="";

  for(const cat in data){

    let menuHTML="";

    for(const item in data[cat]){
      let val=data[cat][item];
      let price= typeof val==="number"?val:val.price;

      if(item.toLowerCase().includes(key)){
        menuHTML+=`
        <div class="menu" onclick="event.stopPropagation();openPopup('${item}',data['${cat}']['${item}'])">
          ${item}<br>Rp ${formatRp(price)}
        </div>`;
      }
    }

    if(menuHTML){
      html+=`
      <div class="menu" onclick="toggleCategory('${cat}')"><b>${cat}</b></div>
      <div id="cat_${cat}" style="display:none;margin-left:10px;">
        ${menuHTML}
      </div>`;
    }
  }

  document.getElementById("menu").innerHTML=html;
}

/* CART */
function renderCart(){
  let html="";

  for(const id in cart){
    let item = cart[id];

    html+=`<div class="menu"><b>${item.name}</b> x ${item.q}<br>`;

    item.detail.forEach(d=>{
      html+=`- ${d.varian||""} ${d.level||""} ${d.note?("("+d.note+")"):""}<br>`;
    });

    html+=`</div>`;
  }

  document.getElementById("cartList").innerHTML = html || "Kosong";
}

function updateTotal(){
  document.getElementById("total").innerText=formatRp(total);
}

/* WA */
function sendWA(){

  const nama = document.getElementById("nama").value;
  const tanggal = document.getElementById("tanggal").value;
  const jam = document.getElementById("jam").value;
  const eventName = document.getElementById("eventName").value;
  const lokasi = document.getElementById("lokasi").value;
  const pax = document.getElementById("pax").value;
  const note = document.getElementById("note").value;

  if(!nama || !tanggal || !jam || !eventName || !lokasi || !pax){
    alert("Lengkapi data reservasi");
    return;
  }

  let text = "RESERVASI\n\n";
  text += "Nama: "+nama+"\n";
  text += "Tanggal: "+tanggal+"\n";
  text += "Jam: "+jam+"\n";
  text += "Event: "+eventName+"\n";
  text += "Lokasi: "+lokasi+"\n";
  text += "Pax: "+pax+"\n\n";

  for(const id in cart){
    let item = cart[id];
    text += "- "+item.name+" x"+item.q+"\n";

    item.detail.forEach(d=>{
      text += "   "+(d.varian||"")+" "+(d.level||"")+" "+(d.note||"")+"\n";
    });
  }

  text += "\nTOTAL: Rp "+formatRp(total);

  window.open("https://wa.me/6285175313330?text="+encodeURIComponent(text));
}

/* INIT */
render();
renderCart();

document.getElementById("popup").addEventListener("click", e=>{
  if(e.target.id==="popup") closePopup();
});

</script>
