/* =====================================================
   📦 MODULE 2: STATE (DATA SEMENTARA)
   👉 Menyimpan cart, total, dll
===================================================== */
let cart = {};
let total = 0;
let searchQuery = "";
let activeCategory = Object.keys(data)[0];




/* =====================================================
   📦 MODULE 3: UTIL FUNCTION
   👉 Fungsi bantu (format, id, dll)
===================================================== */
function formatRp(n){
  return Number(n||0).toLocaleString("id-ID");
}

function getItemPrice(v){
  return typeof v==="number"?v:v.price||0;
}

function makeId(c,i){
  return (c+"_"+i).replace(/\W/g,"_");
}



/* =====================================================
   📦 MODULE 4: SEARCH SYSTEM
   👉 Untuk filter menu
===================================================== */
function applySearch(){
  searchQuery = document.getElementById("search").value.toLowerCase();
  activeCategory = "ALL";
  render();
}



/* =====================================================
   📦 MODULE 5: RENDER ITEM
   👉 Menampilkan 1 item menu
===================================================== */
function renderItem(category,item,val){

  const price = getItemPrice(val);
  const id = makeId(category,item);
  const it = cart[id] || {q:0};

  if(searchQuery && !item.toLowerCase().includes(searchQuery)) return "";

  let opt = "";

  // VARIAN
  if(val.options){
    opt += `<select id="opt_${id}">
      <option value="">Varian</option>
      ${val.options.map(o=>`<option>${o}</option>`).join("")}
    </select>`;
  }

  // LEVEL
  if(val.levels){
    opt += `<select id="lvl_${id}">
      <option value="">Level</option>
      ${val.levels.map(l=>`<option>Level ${l}</option>`).join("")}
    </select>`;
  }

  // CATATAN
  opt += `<input id="note_${id}" placeholder="Catatan item">`;

  return `
  <div class="menu">
    <div class="row">
      <span>${item} - Rp ${formatRp(price)}</span>
      <div>
        <button onclick="add('${item}',${price},'${id}')">+</button>
        <span id="q_${id}">${it.q}</span>
        <button onclick="remove('${item}',${price},'${id}')">-</button>
      </div>
    </div>
    ${opt}
  </div>`;
}



/* =====================================================
   📦 MODULE 6: RENDER SEMUA MENU
===================================================== */
function render(){

  let html = "";

  for(const cat in data){

    const open = activeCategory===cat || activeCategory==="ALL";

    html += `<div class="acc" onclick="toggle('${cat}')">${cat}</div>`;
    html += `<div class="panel" style="display:${open?'block':'none'}">`;

    let found=false;

    for(const item in data[cat]){
      const h = renderItem(cat,item,data[cat][item]);
      if(h){html+=h;found=true;}
    }

    if(!found) html += "Tidak ada menu";

    html += "</div>";
  }

  document.getElementById("menu").innerHTML = html;
}





/* =====================================================
   📦 MODULE 7: ACCORDION (BUKA TUTUP MENU)
===================================================== */
function toggle(cat){
  activeCategory = activeCategory===cat ? null : cat;
  render();
}





/* =====================================================
   📦 MODULE 8: CART SYSTEM (+ / -)
===================================================== */
function add(n,p,id){
  if(!cart[id]) cart[id]={name:n,q:0,p:p};
  cart[id].q++;
  total += p;

  document.getElementById("q_"+id).innerText = cart[id].q;
  document.getElementById("total").innerText = formatRp(total);
}

function remove(n,p,id){
  if(cart[id] && cart[id].q>0){
    cart[id].q--;
    total -= p;

    document.getElementById("q_"+id).innerText = cart[id].q;
    document.getElementById("total").innerText = formatRp(total);
  }
}



/* =====================================================
   📦 MODULE 9: FORMAT DATA
===================================================== */
function formatTanggal(t){
  if(!t) return "-";
  const b=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  const d=new Date(t);
  return `${d.getDate()} ${b[d.getMonth()]} ${d.getFullYear()}`;
}

function formatJam(j){
  if(!j) return "-";
  return j.replace(":",".")+" WIB";
}



/* =====================================================
   📦 MODULE 10: WHATSAPP SYSTEM
   👉 Kirim data ke WA
===================================================== */
function sendWA(){

  const namaInput = document.getElementById("nama").value;
  const tanggalInput = document.getElementById("tanggal").value;
  const jamInput = document.getElementById("jam").value;
  const paxInput = document.getElementById("pax").value;

  

// VALIDASI
  if(!namaInput) return alert("Nama wajib diisi");
  if(!tanggalInput) return alert("Tanggal wajib diisi");
  if(!jamInput) return alert("Jam wajib diisi");
  if(!paxInput || paxInput==0) return alert("Jumlah pax wajib diisi");
  if(total==0) return alert("Pesanan masih kosong");



  const nama = namaInput;
  const tanggal = formatTanggal(tanggalInput);
  const jam = formatJam(jamInput);
  const eventName = document.getElementById("eventName").value || "-";
  const lokasi = document.getElementById("lokasi").value || "-";
  const pax = paxInput;
  const note = document.getElementById("note").value || "-";

  let text=`RESERVASI ZERO SIX SKY LOUNGE

📌 DATA CUSTOMER
Nama: ${nama}
Tanggal: ${tanggal}
Jam: ${jam}
Event: ${eventName}
Lokasi: ${lokasi}
Pax: ${pax}

🍽 DETAIL PESANAN
`;

  let i=1;

  for(const id in cart){
    let it=cart[id];
    if(it.q>0){

      let sub=it.q*it.p;
      let varian=document.getElementById("opt_"+id)?.value;
      let level=document.getElementById("lvl_"+id)?.value;
      let noteItem=document.getElementById("note_"+id)?.value;

      text+=`${i}. ${it.name} x${it.q} = Rp ${formatRp(sub)}\n`;

      if(varian) text+=`   • ${varian}\n`;
      if(level) text+=`   • ${level}\n`;
      if(noteItem) text+=`   • Catatan: ${noteItem}\n`;

      i++;
    }
  }

  text+=`
📝 CATATAN TAMBAHAN
${note}

💰 TOTAL: Rp ${formatRp(total)}
`;

  const url = "https://wa.me/6285175313330?text=" + encodeURIComponent(text);
  window.open(url, "_blank");
}
